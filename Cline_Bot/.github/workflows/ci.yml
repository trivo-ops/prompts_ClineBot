name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check core files exist
        run: |
          echo "Checking core repository files..."

          if [ ! -f "README.md" ]; then
            echo "README.md is missing"
            exit 1
          fi
          echo "README.md exists"

          if [ ! -d ".clinerules" ]; then
            echo ".clinerules directory is missing"
            exit 1
          fi
          echo ".clinerules directory exists"

          if [ ! -d "docs" ]; then
            echo "docs directory is missing"
            exit 1
          fi
          echo "docs directory exists"

          echo "All core files validated successfully"

      - name: List markdown files for visibility
        run: |
          echo "Repository Structure:"
          echo ""
          echo "## Core Files:"
          ls -la README.md
          echo ""
          echo "## .clinerules directory:"
          find .clinerules -name "*.md" | head -10 | sort
          echo ""
          echo "## docs directory:"
          find docs -name "*.md" | head -10 | sort
          echo ""
          echo "## Workflows:"
          find .github/workflows -name "*.yml" | sort

      - name: Validate workflow files
        run: |
          echo "Validating workflow files..."

          if [ ! -f ".github/workflows/ci.yml" ]; then
            echo "CI workflow file is missing"
            exit 1
          fi
          echo "CI workflow file exists"

          echo "Workflow validation completed"
